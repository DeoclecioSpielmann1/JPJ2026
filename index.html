<!DOCTYPE html>

<html lang="pt-br">
<head>

    <title>DSPShop - Mini E-commerce</title>

</head>
<body>

<header>
    <h1>DSPShop</h1>
    <nav>

        <a href="carrinho.html">Carrinho</a>

<main>
    <section class="produtos">

        <div class="produto">

                Adicionar ao Carrinho
            </button>
        </div>

        <div class="produto">
            <h3>Produto 2</h3>

                Adicionar ao Carrinho
            </button>
        </div>

        <div class="produto">
            <h3>Produto 3</h3>
            <p>Descrição do produto 3.</p>
            <p class="preco">R$ 79,90</p>
            <button onclick="adicionarAoCarrinho('Produto 3', 79.90)">
                Adicionar ao Carrinho
            </button>
        </div>

    </section>
